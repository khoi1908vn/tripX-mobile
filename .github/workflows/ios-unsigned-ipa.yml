name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      node_version:
        description: 'Node.js version'
        required: false
        default: '24'
        type: string
      scheme:
        description: 'Xcode scheme (leave empty for auto-detect)'
        required: false
        type: string
      clean:
        description: 'Clean build'
        required: false
        default: false
        type: boolean

# Static group: a second manual run queues behind the first instead of
# overwriting it. github.run_id is unique per run, so it would give no
# protection at all.
concurrency:
  group: ios-build-workflow
  cancel-in-progress: false

jobs:
  build-ios:
    name: Build Unsigned iOS IPA
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start build timer
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Debug - Print environment info
        run: |
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "Working directory: $(pwd)"
          echo "Package manager: npm (detected from package-lock.json)"

      - name: Install dependencies
        run: |
          NPM_START=$(date +%s)
          if [ -d node_modules ]; then
            echo "node_modules cache hit, verifying integrity"
            npm ls --depth=0 > /dev/null 2>&1 && echo "Integrity verified" || npm ci
          else
            echo "node_modules cache miss, running npm ci"
            npm ci
          fi
          echo "NPM_DURATION=$(($(date +%s) - NPM_START))" >> $GITHUB_ENV

      - name: Check for peer dependency issues
        run: |
          echo "Checking for peer dependency warnings..."
          npm ls --depth=0 2>&1 | tee peer-deps.log || true

          if grep -i "UNMET PEER DEPENDENCY\|missing:" peer-deps.log; then
            echo "❌ Peer dependency issues detected!"
            echo "Run 'npm install' locally to resolve peer dependencies."
            exit 1
          fi

          echo "✅ No peer dependency issues detected"

      - name: Verify Expo CLI
        run: |
          npx expo --version
          echo "Dependencies installed successfully"

      - name: Validate TypeScript
        run: npm run type-check
        continue-on-error: true

      - name: Verify required assets
        run: |
          echo "Checking for required assets..."
          MISSING_ASSETS=0

          for asset in assets/icon.png assets/splash.png assets/adaptive-icon.png assets/favicon.png; do
            if [ ! -f "$asset" ]; then
              echo "❌ Missing: $asset"
              MISSING_ASSETS=1
            else
              echo "✅ Found: $asset"
            fi
          done

          if [ $MISSING_ASSETS -eq 1 ]; then
            echo ""
            echo "Generating missing assets..."
            npm install --no-save canvas
            node scripts/generate-assets.js
          fi

          echo "All required assets present"

      - name: Cache Expo prebuild output
        id: cache-expo-prebuild
        uses: actions/cache@v4
        with:
          path: |
            ios
            !ios/Pods
          key: ${{ runner.os }}-expo-ios-${{ hashFiles('app.json', 'package.json', 'metro.config.js') }}
          restore-keys: |
            ${{ runner.os }}-expo-ios-

      - name: Run Expo prebuild for iOS
        run: |
          PREBUILD_START=$(date +%s)
          if [ -d ios ] && [ "${{ inputs.clean }}" != "true" ]; then
            echo "Expo prebuild cache hit, skipping prebuild"
          else
            if [ "${{ inputs.clean }}" == "true" ]; then
              npx expo prebuild --platform ios --clean
            else
              npx expo prebuild --platform ios
            fi
          fi
          echo "PREBUILD_DURATION=$(($(date +%s) - PREBUILD_START))" >> $GITHUB_ENV
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1

      - name: Verify prebuild success
        run: |
          if [ ! -d "ios" ]; then
            echo "ERROR: expo prebuild did not create ios/ directory"
            echo "Check prebuild logs above for errors"
            exit 1
          fi
          if [ ! -f "ios/Podfile" ]; then
            echo "ERROR: Podfile not found after prebuild"
            exit 1
          fi
          echo "Prebuild verification passed"

      - name: Debug - Verify iOS project generated
        run: |
          echo "Checking for ios/ directory..."
          ls -la ios/
          echo ""
          echo "Looking for workspace and project files..."
          find ios -name "*.xcworkspace" -o -name "*.xcodeproj" | head -5

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          # First run: cache miss (Podfile.lock created by prebuild).
          # Subsequent runs: cache hit keyed on Podfile.lock hash.
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Cache CocoaPods specs repo
        id: cache-cocoapods-specs
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods/repos
          key: ${{ runner.os }}-cocoapods-specs-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-specs-

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: |
          PODS_START=$(date +%s)
          if [ -d ~/.cocoapods/repos/trunk ]; then
            echo "CocoaPods specs repo cache hit, skipping --repo-update"
            pod install
          else
            echo "CocoaPods specs repo cache miss, performing --repo-update"
            pod install --repo-update
          fi
          echo "CocoaPods installation complete"
          echo "PODS_DURATION=$(($(date +%s) - PODS_START))" >> $GITHUB_ENV

      - name: Debug - Verify CocoaPods setup
        working-directory: ios
        run: |
          echo "Podfile.lock checksum:"
          cat Podfile.lock | head -5
          echo ""
          echo "Installed pods:"
          ls -la Pods/ | head -10

      - name: Detect Xcode configuration
        id: xcode-config
        working-directory: ios
        run: |
          # Find workspace (preferred) or project file
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1 | sed 's|^\./||')
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -1 | sed 's|^\./||')

          # Scheme from input, else default to slug "tripx-mobile" from app.json
          if [ -n "${{ inputs.scheme }}" ]; then
            SCHEME="${{ inputs.scheme }}"
          else
            SCHEME="tripX"
          fi

          # Prefer workspace over project
          if [ -n "$WORKSPACE" ]; then
            BUILD_TARGET="-workspace $WORKSPACE"
            echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
            echo "Using workspace: $WORKSPACE"
          elif [ -n "$PROJECT" ]; then
            BUILD_TARGET="-project $PROJECT"
            echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
            echo "Using project: $PROJECT"
          else
            echo "ERROR: No workspace or project found"
            exit 1
          fi

          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "build_target=$BUILD_TARGET" >> "$GITHUB_OUTPUT"
          echo "Detected scheme: $SCHEME"

          # Validate scheme exists; fail fast with the available list
          if [ -n "$WORKSPACE" ]; then
            AVAILABLE_SCHEMES=$(xcodebuild -workspace "$WORKSPACE" -list | grep -A 100 "Schemes:" | tail -n +2 || echo "")
          else
            AVAILABLE_SCHEMES=$(xcodebuild -project "$PROJECT" -list | grep -A 100 "Schemes:" | tail -n +2 || echo "")
          fi

          if ! echo "$AVAILABLE_SCHEMES" | grep -q "$SCHEME"; then
            echo "ERROR: Scheme '$SCHEME' not found in available schemes:"
            echo "$AVAILABLE_SCHEMES"
            echo ""
            echo "Please specify the correct scheme via the workflow input."
            exit 1
          fi
          echo "Scheme validation passed"

      - name: Debug - Print Xcode configuration
        run: |
          echo "Workspace: ${{ steps.xcode-config.outputs.workspace }}"
          echo "Project: ${{ steps.xcode-config.outputs.project }}"
          echo "Scheme: ${{ steps.xcode-config.outputs.scheme }}"
          echo "Build target: ${{ steps.xcode-config.outputs.build_target }}"

      - name: Cache Xcode derived data
        id: cache-xcode-derived
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-derived-${{ hashFiles('ios/Podfile.lock', 'package.json', 'app.json') }}
          restore-keys: |
            ${{ runner.os }}-xcode-derived-

      - name: Build and archive iOS app (unsigned)
        working-directory: ios
        run: |
          XCODE_START=$(date +%s)
          ARCHIVE_PATH="$RUNNER_TEMP/tripX.xcarchive"

          xcodebuild archive \
            ${{ steps.xcode-config.outputs.build_target }} \
            -scheme "${{ steps.xcode-config.outputs.scheme }}" \
            -configuration "${{ inputs.profile }}" \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee "$RUNNER_TEMP/xcodebuild.log"

          echo "Archive created at: $ARCHIVE_PATH"
          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_ENV"
          echo "XCODE_DURATION=$(($(date +%s) - XCODE_START))" >> $GITHUB_ENV

      - name: Debug - Verify archive structure
        run: |
          echo "Archive contents:"
          ls -la "${{ env.archive_path }}"
          echo ""
          echo "Applications in archive:"
          ls -la "${{ env.archive_path }}/Products/Applications/"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs-${{ github.run_number }}
          path: ${{ runner.temp }}/xcodebuild.log
          retention-days: 7

      - name: Package IPA
        run: |
          ARCHIVE_PATH="${{ env.archive_path }}"
          APP_PATH=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" | head -1)
          APP_NAME=$(basename "$APP_PATH")
          IPA_PATH="$RUNNER_TEMP/tripX-unsigned.ipa"

          echo "Found app: $APP_PATH"
          echo "App name: $APP_NAME"

          # Create Payload directory and copy .app into it
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"

          # Zip Payload into a .ipa
          cd "$RUNNER_TEMP"
          zip -r "$IPA_PATH" Payload

          echo "IPA created at: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Debug - Verify IPA created
        run: |
          echo "IPA file info:"
          ls -lh "${{ env.ipa_path }}"
          echo ""
          echo "IPA size: $(du -h ${{ env.ipa_path }} | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: tripX-unsigned-ipa-${{ github.run_number }}
          path: ${{ env.ipa_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        if: always()
        run: |
          BUILD_DURATION=$(($(date +%s) - BUILD_START))
          BUILD_MIN=$((BUILD_DURATION / 60))
          BUILD_SEC=$((BUILD_DURATION % 60))

          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### ⏱️ Build Timing" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Duration |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| npm install | ${NPM_DURATION:-N/A}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Expo prebuild | ${PREBUILD_DURATION:-N/A}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CocoaPods install | ${PODS_DURATION:-N/A}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Xcode build | ${XCODE_DURATION:-N/A}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total build** | **${BUILD_MIN}m ${BUILD_SEC}s** |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 📦 Cache Status" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| node_modules | ${{ steps.cache-node-modules.outputs.cache-hit == 'true' && '✅ Hit' || '❌ Miss' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Expo prebuild | ${{ steps.cache-expo-prebuild.outputs.cache-hit == 'true' && '✅ Hit' || '❌ Miss' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CocoaPods specs | ${{ steps.cache-cocoapods-specs.outputs.cache-hit == 'true' && '✅ Hit' || '❌ Miss' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Xcode derived data | ${{ steps.cache-xcode-derived.outputs.cache-hit == 'true' && '✅ Hit' || '❌ Miss' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifact Details" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Name:** tripX-unsigned-ipa-${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Size:** $(du -h ${{ env.ipa_path }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Configuration:** ${{ inputs.profile }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Scheme:** ${{ steps.xcode-config.outputs.scheme }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The IPA is unsigned. Sign it locally before installing." >> "$GITHUB_STEP_SUMMARY"
